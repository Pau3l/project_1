<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Styles Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #080808; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
    
    .aurora-border {
      position: relative;
    }
    .aurora-border::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 1rem;
      background: linear-gradient(135deg, #ff4d00, #ffb347, #ff1a1a);
      z-index: -1;
      filter: blur(8px);
      opacity: 0.8;
    }
  </style>
</head>
<body class="p-8 min-h-screen grid grid-cols-2 gap-12 items-center justify-items-center">

  <!-- STYLE A: Glassmorphism -->
  <div class="w-full max-w-sm rounded-[24px] overflow-hidden" style="background: radial-gradient(120% 120% at 50% 0%, rgba(255,77,0,0.15) 0%, transparent 100%), rgba(26,26,26,0.6); backdrop-filter: blur(24px); box-shadow: inset 0 1px 1px 0 rgba(255,255,255,0.1), 0 20px 40px -10px rgba(0,0,0,0.5);">
    <div class="p-5 border-b border-white/5 flex justify-between items-center">
      <h3 class="font-bold text-sm tracking-widest text-[#ff4d00]">ADD PAYMENT</h3>
      <div class="w-6 h-6 rounded-full bg-white/5 flex items-center justify-center text-xs">✕</div>
    </div>
    <div class="p-6 space-y-4">
      <div class="space-y-1.5">
        <label class="text-xs text-white/50">Amount</label>
        <div class="bg-black/30 rounded-xl px-4 py-2 flex justify-between text-sm">
          <span>$1,250.00</span>
        </div>
      </div>
      <button class="w-full mt-4 bg-gradient-to-r from-[#ff4d00] to-[#ff6a33] rounded-xl py-2.5 text-xs font-bold shadow-[0_0_15px_rgba(255,77,0,0.3)]">Save Payment</button>
    </div>
    <div class="absolute -top-6 -left-6 bg-orange-500 text-white text-xs px-3 py-1 font-bold rounded-lg shadow-lg rotate-[-10deg]">STYLE A: Premium Glass</div>
  </div>

  <!-- STYLE B: Flat Minimalist -->
  <div class="w-full max-w-sm rounded-sm overflow-hidden bg-[#0a0a0a] border border-[#222] relative">
    <div class="p-4 border-b border-[#222] flex justify-between items-center">
      <h3 class="font-mono text-xs uppercase text-gray-300">New_Transaction</h3>
      <div class="text-gray-500 text-xs">Esc</div>
    </div>
    <div class="p-6 space-y-5">
      <div class="space-y-2">
        <label class="font-mono text-[10px] text-gray-500 uppercase tracking-widest">Amount_USD</label>
        <div class="border border-[#ff4d00] bg-black px-3 py-2 flex justify-between text-sm rounded-sm">
          <span class="text-white">1250.00</span>
          <span class="w-1.5 h-4 bg-[#ff4d00] animate-pulse"></span>
        </div>
      </div>
      <button class="w-full bg-[#111] hover:bg-[#ff4d00] text-white border border-[#333] hover:border-[#ff4d00] rounded-sm py-2.5 text-xs font-mono uppercase transition-colors">Execute_Data</button>
    </div>
    <div class="absolute -top-4 -right-4 bg-[#333] text-white text-[10px] px-2 py-1 font-mono uppercase border border-[#555]">STYLE B: Minimalist</div>
  </div>

  <!-- STYLE C: Neomorphic Soft Dark -->
  <div class="w-full max-w-sm rounded-[32px] overflow-hidden bg-[#1f1f1f] shadow-[0_35px_60px_-15px_rgba(0,0,0,0.8)] relative mt-10">
    <div class="p-6 text-center">
      <div class="w-12 h-12 rounded-full bg-[#2a2a2a] shadow-[inset_0_2px_4px_rgba(0,0,0,0.3),_0_1px_0_rgba(255,255,255,0.05)] mx-auto mb-4 flex grid items-center justify-center">
        <div class="w-4 h-4 bg-[#ff4d00] rounded-full shadow-[0_0_10px_#ff4d00]"></div>
      </div>
      <h3 class="font-medium text-lg text-gray-200">Payment Details</h3>
    </div>
    <div class="px-8 pb-8 space-y-5">
      <div class="bg-[#171717] rounded-full px-5 py-3.5 shadow-inner flex justify-between text-sm border border-transparent hover:border-[#ff4d00]/30 transition-colors">
        <span class="text-gray-400">Amount</span>
        <span class="text-white font-medium">$1,250.00</span>
      </div>
      <button class="w-full bg-[#2a2a2a] shadow-[0_4px_10px_rgba(0,0,0,0.3),_inset_0_1px_0_rgba(255,255,255,0.1)] rounded-full py-4 text-sm font-medium text-[#ff4d00]">Confirm Payment</button>
    </div>
    <div class="absolute -top-6 -left-6 bg-gray-600 text-white text-xs px-3 py-1 font-medium rounded-full shadow-lg rotate-[-10deg]">STYLE C: Soft Dark</div>
  </div>

  <!-- STYLE D: Aurora Glow -->
  <div class="w-full max-w-sm rounded-2xl bg-[#050505] relative aurora-border mt-10 p-[1px]">
    <div class="bg-[#050505] rounded-2xl w-full h-full relative z-10 overflow-hidden">
      <div class="p-6 border-b border-white/10 flex justify-between items-center relative">
        <h3 class="font-bold text-base text-white relative z-10">Add Payment</h3>
        <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-xs">✕</div>
      </div>
      <div class="p-6 space-y-6">
        <div class="space-y-2">
          <label class="text-xs text-gray-400 font-semibold uppercase">Total Amount</label>
          <div class="bg-white/5 border border-white/10 rounded-lg px-4 py-3 flex text-base text-white">
            <span class="text-gray-500 mr-2">$</span> 1,250.00
          </div>
        </div>
        <button class="w-full bg-gradient-to-r from-[#ff4d00] via-[#ffaa00] to-[#ff4d00] rounded-xl py-3 text-sm font-bold shadow-lg shadow-[#ff4d00]/40 text-black">Process Securely</button>
      </div>
    </div>
    <div class="absolute -top-6 -right-6 bg-gradient-to-r from-yellow-400 to-[#ff4d00] text-black text-xs px-3 py-1 font-bold rounded-lg shadow-lg rotate-[10deg] z-50">STYLE D: Aurora</div>
  </div>

</body>
</html>
